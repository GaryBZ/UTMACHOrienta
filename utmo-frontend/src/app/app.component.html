<div class="app-layout">
  <app-navbar *ngIf="!hideLayout"></app-navbar>
  <div
    class="app-router"
    [style.flex]="'1'"
    [style.overflow-y]="'auto'"
    [style.overflow-x]="'hidden'"
    [style.padding-top.px]="hideLayout ? 0 : 80"
  >
    <router-outlet></router-outlet>
    <app-footer *ngIf="!hideLayout"></app-footer>
  </div>
</div>
